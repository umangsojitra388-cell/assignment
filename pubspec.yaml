name: assignment
description: Flutter OCR scanner (card + passbook) with clean architecture and BLoC.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  card_scanner: ^1.0.4
  google_mlkit_text_recognition: ^0.14.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  image_picker: ^1.1.2
  camera: ^0.12.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
